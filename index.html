<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日本語 Review</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header class="header">

<h1>
日本語 Review
</h1>


<p>
今日復習
<span id="todayCount">
20
</span>
词
</p>



<div class="header-actions">


<a
href="stats.html"
class="icon-btn"
aria-label="学习统计">

📊

</a>


<button
id="settingBtn"
class="icon-btn"
aria-label="设置">

⚙️

</button>


</div>


</header>





<section class="status-card">


<div>
📚 Lesson

<span id="lessonDisplay">
1 - 5
</span>

</div>



<div>
📝

<span id="progressGroup">
今日任务
</span>

</div>


</section>






<section class="progress-area">


<div class="progress-title">

<span>
今日进度
</span>


<span id="progressText">
0 / 20
</span>


</div>



<div class="progress-bar">


<div
id="progressInner"
class="progress-inner">

</div>


</div>


</section>






<section
id="wordCard"
class="word-card">



<button
id="masterBtn"
class="master-btn">

☆ 标记已掌握

</button>





<div class="mode">

中文 → 日语

</div>



<div
id="meaning"
class="meaning">

</div>






<section id="recallArea">


<button
id="rememberBtn"
class="primary-btn">

我会

</button>




<button
id="showAnswerBtn"
class="secondary-text">

查看答案

</button>


</section>








<section
id="inputArea"
class="hidden">


<input
id="answerInput"
placeholder="请输入日语">


<div class="answer-actions">


<button
id="submitBtn"
class="primary-btn">

确认答案

</button>



<button
id="ignoreBtn"
class="link-btn">

本次忽略

</button>


</div>





<button
id="showAnswerInInput"
class="secondary-text">

查看答案

</button>


</section>








<section
id="resultArea"
class="hidden">


<div
id="resultMessage">

</div>


<div
id="feedbackArea"
class="feedback-area">

</div>


<div
id="answerComparison"
class="answer-comparison hidden">

</div>



<div
id="jpAnswer"
class="jp-answer">

</div>


<div
id="exampleArea"
class="example-area hidden">

</div>


</section>







<button
id="nextBtn"
class="primary-btn hidden">

下一题 →

</button>



</section>









<section
id="summaryArea"
class="summary-card hidden">



<h2>
🎉 今日完成
</h2>





<div class="summary-number">



<div>

✅ 已掌握

<span id="correctCount">
0
</span>

</div>





<div>

📌 需要复习

<span id="wrongCount">
0
</span>

</div>





<div>

⏸ 已忽略

<span id="ignoredCount">
0
</span>

</div>




</div>








<h3>
需要复习
</h3>



<div
id="wrongList"
class="wrong-list">

</div>





<button
id="reviewWrongBtn"
class="primary-btn">

复习需要复习的单词

</button>


<button
id="newGroupBtn"
class="secondary-btn summary-new-group-btn">

再来一组

</button>



</section>









</div>






<div
id="overlay"
class="overlay">

</div>







<div
id="drawer"
class="drawer">


<div class="drawer-header">


<h2>
设置
</h2>



<button
id="closeBtn"
class="drawer-close">

×

</button>


</div>







<label>
复习范围
</label>


<div class="range-container">


<input
id="lessonStart"
type="range"
min="1"
max="50"
value="1">


<input
id="lessonEnd"
type="range"
min="1"
max="50"
value="5">


</div>





<div class="range-text">


第

<span id="startLessonText">
1
</span>

课

-

第

<span id="endLessonText">
5
</span>

课


</div>






<label>
每日复习数量
</label>


<input
id="dailyCount"
type="number"
value="20">






<button
id="saveBtn"
class="primary-btn">

保存设置

</button>



</div>









<div
id="confirmModal"
class="modal hidden">


<div class="modal-box">


<h3>
确认已掌握？
</h3>



<p>
标记后，这个单词以后不会出现在每日复习中。
</p>




<div class="modal-actions">


<button
id="cancelMaster"
class="secondary-btn">

取消

</button>



<button
id="confirmMaster"
class="primary-btn">

确定

</button>


</div>


</div>


</div>








<div
id="reviewDecisionModal"
class="modal hidden">


<div class="modal-box">


<h3>
本轮记忆已完成
</h3>


<p id="reviewDecisionText">
这个单词已经完成 3 次成功回忆，还需要继续复习吗？
</p>


<div class="modal-actions review-decision-actions">


<button
id="continueReviewBtn"
class="secondary-btn">

继续复习

</button>


<button
id="masterFromReviewBtn"
class="primary-btn">

标记为已掌握

</button>


</div>


</div>


</div>


<script src="memory.js"></script>
<script src="app.js"></script>


</body>

</html>
