<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背新单词 - 日本語 Review</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app learn-app">
    <header class="header learn-header">
        <div>
            <h1>日本語 Review</h1>
            <p>按课程认识新单词</p>
        </div>
        <a href="stats.html" class="icon-btn learn-stats-link" aria-label="学习统计">📊</a>
    </header>

    <nav class="mode-switch" aria-label="学习模式">
        <a href="learn.html" class="active" aria-current="page">背新单词</a>
        <a href="index.html">复习</a>
    </nav>

    <section class="learn-toolbar" aria-label="课程和内容切换">
        <div class="lesson-navigation">
            <button id="previousLessonBtn" class="lesson-step-btn" type="button" aria-label="上一课" title="上一课">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m14.5 6-6 6 6 6"/>
                </svg>
            </button>
            <div class="lesson-select-control">
                <select id="learnLesson" aria-label="选择课程"></select>
                <svg class="lesson-select-chevron" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7.5 9.5 4.5 4.5 4.5-4.5"/>
                </svg>
            </div>
            <button id="nextLessonBtn" class="lesson-step-btn" type="button" aria-label="下一课" title="下一课">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9.5 6 6 6-6 6"/>
                </svg>
            </button>
        </div>

        <nav class="learn-content-switch" role="tablist" aria-label="本课学习内容">
            <button id="wordContentTab" class="active" type="button" role="tab" aria-selected="true" aria-controls="wordLearningView">单词</button>
            <button id="grammarContentTab" type="button" role="tab" aria-selected="false" aria-controls="grammarLearningView">语法</button>
        </nav>
    </section>

    <section id="wordLearningView" role="tabpanel" aria-labelledby="wordContentTab">
        <section class="learn-progress-panel" aria-label="本课单词进度">
            <div class="learn-progress-heading">
                <span>本课进度</span>
                <div class="learn-progress-tools">
                    <label class="auto-audio-control" for="autoAudioToggle">
                        <span>自动读音</span>
                        <input id="autoAudioToggle" type="checkbox" role="switch" aria-label="自动播放单词读音">
                        <span class="auto-audio-switch" aria-hidden="true"></span>
                    </label>
                    <strong id="learnProgress">0 / 0</strong>
                </div>
            </div>
            <div id="learnProgressTrack" class="learn-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
                <span id="learnProgressBar"></span>
            </div>
        </section>

        <section class="learn-card" id="learnCard">
            <span id="learnSeenBadge" class="learn-seen-badge hidden">已看过</span>
            <div id="learnJapanese" class="learn-japanese"></div>
            <button id="learnAudioBtn" class="learn-audio-btn" type="button" aria-label="播放单词读音">
                <svg class="audio-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path class="audio-speaker" d="M4 9.5v5h3.5l4.5 3.6V5.9L7.5 9.5H4Z"/>
                    <path class="audio-wave audio-wave-one" d="M15 9.2c1.4 1.5 1.4 4.1 0 5.6"/>
                    <path class="audio-wave audio-wave-two" d="M18 6.7c2.8 2.9 2.8 7.7 0 10.6"/>
                </svg>
            </button>
            <div id="learnReading" class="learn-reading"></div>
            <div id="learnMeaning" class="learn-meaning"></div>
            <div id="learnMeta" class="learn-meta"></div>
            <section id="learnExamples" class="learn-examples"></section>
        </section>

        <div class="learn-actions">
            <button id="learnPrevious" class="learn-previous" type="button">← 上一个</button>
            <button id="learnNext" class="primary-btn" type="button">学过了，下一个 →</button>
        </div>

        <section id="lessonCompleteActions" class="lesson-complete-actions hidden">
            <p>这一课已经看完了，接下来想怎么学？</p>
            <div>
                <button id="repeatLessonBtn" class="learn-previous" type="button">再来一遍</button>
                <button id="testLessonBtn" class="primary-btn" type="button">好了，可以测试了 →</button>
            </div>
        </section>
    </section>

    <section id="grammarLearningView" class="hidden" role="tabpanel" aria-labelledby="grammarContentTab">
        <article class="grammar-card">
            <div class="grammar-card-topline">
                <span id="grammarCounterBadge" class="grammar-counter-badge">第 34 课 · 1 / 4</span>
                <a id="grammarSource" class="grammar-source-link" href="#" target="_blank" rel="noopener noreferrer">查看原笔记 ↗</a>
            </div>

            <header class="grammar-heading">
                <h2 id="grammarTitle"></h2>
                <p id="grammarSubtitle"></p>
            </header>

            <section class="grammar-section">
                <h3>接续</h3>
                <div id="grammarStructure" class="grammar-structure-list"></div>
            </section>

            <section class="grammar-section">
                <h3>核心意思</h3>
                <p id="grammarSummary" class="grammar-summary"></p>
            </section>

            <section class="grammar-section grammar-note-section">
                <h3>使用提醒</h3>
                <ul id="grammarNotes"></ul>
            </section>

            <section class="grammar-section">
                <h3>例句</h3>
                <div id="grammarExamples" class="grammar-example-list"></div>
            </section>
        </article>

        <div class="grammar-actions">
            <button id="grammarPrevious" class="learn-previous" type="button">← 上一个</button>
            <button id="grammarNext" class="primary-btn" type="button">下一个 →</button>
        </div>
        <p id="grammarCompleteNotice" class="grammar-complete-notice hidden">本课语法已看完。可以回到“本课单词”，也可以直接去复习测试。</p>
    </section>

    <section id="lessonTestView" class="lesson-test-view hidden" aria-label="本课单词测试">
        <div class="lesson-test-heading">
            <button id="exitLessonTestBtn" class="lesson-test-back" type="button">← 返回本课</button>
            <strong id="lessonTestTitle">第 1 课测试</strong>
        </div>

        <section id="lessonTestProgress" class="progress-area">
            <div class="progress-title">
                <span>本次测试</span>
                <span id="lessonTestProgressText">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div id="lessonTestProgressBar" class="progress-inner"></div>
            </div>
        </section>

        <section id="lessonTestCard" class="word-card lesson-test-card">
            <div class="mode">中文 → 日语</div>
            <div id="lessonTestMeaning" class="meaning"></div>

            <section id="lessonTestRecallArea">
                <button id="lessonTestRememberBtn" class="primary-btn" type="button">我会</button>
                <button id="lessonTestShowAnswerBtn" class="secondary-text" type="button">查看答案</button>
            </section>

            <section id="lessonTestInputArea" class="hidden">
                <input id="lessonTestAnswerInput" placeholder="请输入日语" autocomplete="off">
                <div class="answer-actions">
                    <button id="lessonTestSubmitBtn" class="primary-btn" type="button">确认答案</button>
                    <button id="lessonTestIgnoreBtn" class="link-btn" type="button">本次忽略</button>
                </div>
                <button id="lessonTestShowAnswerInInput" class="secondary-text" type="button">查看答案</button>
            </section>

            <section id="lessonTestResultArea" class="hidden">
                <div id="lessonTestResultMessage"></div>
                <div id="lessonTestComparison" class="answer-comparison hidden"></div>
                <div id="lessonTestAnswer" class="jp-answer"></div>
            </section>

            <button id="lessonTestNextBtn" class="primary-btn hidden" type="button">下一题 →</button>
        </section>

        <section id="lessonTestSummary" class="summary-card hidden">
            <h2>🎉 本课测试完成</h2>
            <p id="lessonTestSummaryText" class="lesson-test-summary-text"></p>
            <div class="summary-number">
                <div>✅ 正确 <span id="lessonTestCorrectCount">0</span></div>
                <div>📌 待加强 <span id="lessonTestWrongCount">0</span></div>
                <div>⏸ 已忽略 <span id="lessonTestIgnoredCount">0</span></div>
            </div>
            <div id="lessonTestWrongList" class="wrong-list"></div>
            <button id="repeatLessonTestBtn" class="primary-btn" type="button">再测一次</button>
            <button id="finishLessonTestBtn" class="secondary-btn summary-new-group-btn" type="button">返回本课单词</button>
        </section>
    </section>
</main>
<script src="learn.js"></script>
</body>
</html>
